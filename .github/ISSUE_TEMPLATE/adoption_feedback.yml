name: Adoption feedback
description: Report how a real or trial adoption attempt went, where friction appeared, and what should come next.
title: "[Adoption] "
labels:
  - feedback
body:
  - type: input
    id: version
    attributes:
      label: AsterGraph version
      description: NuGet package version or public tag you evaluated
      placeholder: 0.11.0-beta / v0.11.0-beta
    validations:
      required: true
  - type: dropdown
    id: route
    attributes:
      label: Route or artifact tried
      options:
        - HelloWorld
        - AsterGraph.Starter.Avalonia
        - HelloWorld.Avalonia
        - ConsumerSample.Avalonia
        - HostSample
        - PackageSmoke
        - ScaleSmoke
        - Demo
        - Other
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: Main friction
      description: What slowed you down or felt unclear?
    validations:
      required: true
  - type: textarea
    id: proof_markers
    attributes:
      label: Evidence proof markers
      description: Include exact proof marker lines from your artifact set
      placeholder: HELLOWORLD_WPF_OK:True
    validations:
      required: true
  - type: textarea
    id: support_bundle
    attributes:
      label: Support bundle attachment
      description: Optional local path from `ConsumerSample.Avalonia -- --proof --support-bundle <support-bundle-path>`; reuse the emitted `SUPPORT_BUNDLE_PATH:...` line as the attachment note
      placeholder: SUPPORT_BUNDLE_PATH:...
