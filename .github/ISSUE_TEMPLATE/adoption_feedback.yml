name: Adoption feedback
description: Report how a real or trial adoption attempt went in the same bounded intake vocabulary used by the docs.
title: "[Adoption] "
labels:
  - feedback
body:
  - type: input
    id: version
    attributes:
      label: AsterGraph version
      description: NuGet package version or public tag you evaluated
      placeholder: 0.11.0-beta / v0.11.0-beta
    validations:
      required: true
  - type: dropdown
    id: route
    attributes:
      label: Bounded intake route or artifact tried
      options:
        - HelloWorld
        - AsterGraph.Starter.Avalonia
        - HelloWorld.Avalonia
        - ConsumerSample.Avalonia
        - HostSample
        - PackageSmoke
        - ScaleSmoke
        - Demo
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: Main friction
      description: What slowed you down or felt unclear?
    validations:
      required: true
  - type: textarea
    id: proof_markers
    attributes:
      label: Evidence proof markers
      description: Include exact proof marker lines from your artifact set
      placeholder: HELLOWORLD_WPF_OK:True
    validations:
      required: true
  - type: textarea
    id: support_bundle
    attributes:
      label: Bounded intake record attachment note
      description: Attachment note for the bounded intake record. Use `SUPPORT_BUNDLE_PATH:...` when the route produced a bundle, or `NO_SUPPORT_BUNDLE:route-cannot-produce-one` when it did not.
      placeholder: SUPPORT_BUNDLE_PATH:... or NO_SUPPORT_BUNDLE:route-cannot-produce-one
