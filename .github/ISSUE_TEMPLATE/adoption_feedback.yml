name: Adoption feedback
description: Report how a real or trial adoption attempt went in the same bounded intake vocabulary used by the docs.
title: "[Adoption] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Keep this as one bounded intake record. Current proof markers: `ADOPTION_INTAKE_EVIDENCE_OK:True`, `SUPPORT_BUNDLE_INTAKE_HANDOFF_OK:True`, and `REAL_EXTERNAL_REPORT_GATE_OK:True`.
  - type: input
    id: version
    attributes:
      label: AsterGraph version
      description: NuGet package version or public tag you evaluated
      placeholder: 0.11.0-beta / v0.11.0-beta
    validations:
      required: true
  - type: dropdown
    id: report_kind
    attributes:
      label: Report type
      description: A real external report must be filed by someone evaluating or embedding AsterGraph outside maintainer rehearsal.
      options:
        - Real external adoption report
        - Maintainer-seeded rehearsal / synthetic dry-run
    validations:
      required: true
  - type: input
    id: adopter_context
    attributes:
      label: Adopter context
      description: Public project, company, personal handle, or "private adopter" plus the host context you evaluated.
      placeholder: Contoso design tools / @handle personal prototype / private adopter using Avalonia
    validations:
      required: true
  - type: input
    id: dotnet_version
    attributes:
      label: .NET SDK version
      description: dotnet --version output
      placeholder: 8.0.100
    validations:
      required: true
  - type: dropdown
    id: route
    attributes:
      label: Route or artifact tried
      options:
        - HelloWorld
        - AsterGraph.Starter.Avalonia
        - HelloWorld.Avalonia
        - ConsumerSample.Avalonia
        - HostSample
        - PackageSmoke
        - ScaleSmoke
        - Demo
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: UI adapter
      description: Which UI framework adapter are you using?
      options:
        - Avalonia (canonical)
        - WPF (validation-only)
        - Other / Custom
    validations:
      required: true
  - type: textarea
    id: custom_nodes
    attributes:
      label: Custom nodes / ports / edges
      description: Are you using custom node definitions, port groups, or edge templates? If yes, briefly describe.
      placeholder: No custom nodes / Using custom port groups with min/max connections / Using custom node templates
    validations:
      required: false
  - type: textarea
    id: friction
    attributes:
      label: Friction
      description: What slowed you down or felt unclear?
    validations:
      required: true
  - type: textarea
    id: proof_markers
    attributes:
      label: Proof markers
      description: Include the failed proof marker lines first, then the exact proof marker lines from your artifact set. Example markers: CONSUMER_SAMPLE_PARAMETER_OK, CONSUMER_SAMPLE_METADATA_PROJECTION_OK, SUPPORT_BUNDLE_PERSISTENCE_OK.
      placeholder: FAILED:<marker line>\nCONSUMER_SAMPLE_PARAMETER_OK:False\nCONSUMER_SAMPLE_METADATA_PROJECTION_OK:False\nSUPPORT_BUNDLE_PERSISTENCE_OK:False
    validations:
      required: true
  - type: textarea
    id: support_bundle
    attributes:
      label: Support-bundle attachment note
      description: Use the emitted `SUPPORT_BUNDLE_PATH:...` line as the support-bundle attachment note on the bounded intake record when the route produced a bundle, or `NO_SUPPORT_BUNDLE:route-cannot-produce-one` when it did not. When a bundle exists, include `parameterSnapshots` rows for `status`, `owner`, and `priority`.
      placeholder: SUPPORT_BUNDLE_PATH:... with parameterSnapshots rows for status, owner, and priority, or NO_SUPPORT_BUNDLE:route-cannot-produce-one
  - type: dropdown
    id: claim_expansion_status
    attributes:
      label: Claim-expansion status
      description: A single report does not widen public claims; candidate expansion still needs 3-5 real external reports on the same bounded risk.
      options:
        - No support/capability expansion requested
        - Candidate support/capability expansion
        - Unsure / needs maintainer triage
    validations:
      required: true
