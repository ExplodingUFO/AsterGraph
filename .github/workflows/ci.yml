name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality-gates:
    name: quality-gates (${{ matrix.framework }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        framework:
          - net8.0
          - net9.0

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run repo validation lane
        shell: pwsh
        run: .\eng\ci.ps1 -Lane all -Framework ${{ matrix.framework }} -Configuration Release
